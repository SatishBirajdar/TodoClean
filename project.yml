name: CleanTodo
options:
  bundleIdPrefix: com.satishbirajdar
  deploymentTarget:
    iOS: "17.0"
  xcodeVersion: "16.0"
  createIntermediateGroups: true
  generateEmptyDirectories: true

settings:
  base:
    SWIFT_VERSION: "5.9"

targets:
  CleanTodo:
    type: application
    platform: iOS
    sources:
      - CleanTodo
    settings:
      base:
        INFOPLIST_GENERATION_MODE: GeneratedFile
        PRODUCT_BUNDLE_IDENTIFIER: com.satishbirajdar.CleanTodo
        MARKETING_VERSION: "1.0"
        CURRENT_PROJECT_VERSION: "1"
        GENERATE_INFOPLIST_FILE: "YES"
        INFOPLIST_KEY_UIApplicationSceneManifest_Generation: "YES"
        INFOPLIST_KEY_UIApplicationSupportsIndirectInputEvents: "YES"
        INFOPLIST_KEY_UILaunchScreen_Generation: "YES"
        INFOPLIST_KEY_UISupportedInterfaceOrientations_iPad: "UIInterfaceOrientationPortrait UIInterfaceOrientationPortraitUpsideDown UIInterfaceOrientationLandscapeLeft UIInterfaceOrientationLandscapeRight"
        INFOPLIST_KEY_UISupportedInterfaceOrientations_iPhone: "UIInterfaceOrientationPortrait"

  CleanTodoTests:
    type: bundle.unit-test
    platform: iOS
    sources:
      - CleanTodoTests
    dependencies:
      - target: CleanTodo
    settings:
      base:
        INFOPLIST_GENERATION_MODE: GeneratedFile
        GENERATE_INFOPLIST_FILE: "YES"
        PRODUCT_BUNDLE_IDENTIFIER: com.satishbirajdar.CleanTodoTests
        TEST_HOST: "$(BUILT_PRODUCTS_DIR)/CleanTodo.app/$(BUNDLE_EXECUTABLE_FOLDER_PATH)/CleanTodo"
        BUNDLE_LOADER: "$(TEST_HOST)"
